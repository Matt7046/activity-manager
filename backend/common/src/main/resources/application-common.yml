# common/src/main/resources/application-common.yml
jdk:
  tls:
    client:
      protocol: TLSv1.2 

spring:
  application:
    name: common-config
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASSWORD}
  mail:
    from: ${EMAIL_FROM}
  data:
    mongo:
      uri: ${MONGO_URI}
      tls:
        cert: ${MONGO_CERT_PATH:/app/certificate/client.pem}
        key: ${MONGO_KEY_PATH:/app/certificate/client-key.pem}
      database: ${MONGO_DB}
  elasticsearch:
    uris: ${ELASTIC_URIS}
    username: ${ELASTIC_USER}
    password: ${ELASTIC_PASSWORD}
    connection-timeout: 5s
    socket-timeout: 30s
  ssl:
    bundle:
      jks:
        elastic-bundle:
          truststore:
            location: ${ELASTIC_TRUSTSTORE_PATH:file:/app/elasticsearch/certs/elastic-client.p12}
            password: ${ELASTIC_BUNDLE_PASSWORD}
            type: PKCS12

app:
  auth:
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
  gpt:
    token: ${GPT_TOKEN}
  secret:
    key: ${APP_SECRET_KEY}
    crypt:
      key: ${APP_CRYPT_KEY}
      user:
        key: ${APP_USER_KEY}
        name: ${APP_USER_NAME}
  algorithm1: AES
  algorithm2: HmacSHA256
  address1: ${ADDRESS_1}
  address2: ${ADDRESS_2}
  address3: ${ADDRESS_3}
  security:
    roles: USER
    username: user
    crypt: bcrypt
  page:
    address:
      all: /**
      webSocket: /ws/**
      home: /home
      token: /api/auth/token
      policy: /api/privacy-policy
      login: /api/userpoint/dati/login
      sitemap: /sitemap.xml
      register: /api/userpoint/dati/user
      reset:
        password: /api/userpoint/dati/user/reset/password
    service:
        gpt: https://api.openai.com/v1
        image: http://image-service:8080
        auth: http://auth-service:8080
        activity: http://activity-service:8080
        userpoint: http://user-point-service:8080
    path:
      image: /api/image
      auth: /api/auth
      activity: /api/activity
      logactivity: /api/logactivity
      userpoint: /api/userpoint
      family-point: /api/family-point
      family-log: /api/family-log
  rabbitmq:
    notification:
      exchange:
        exchangeName: notification-exchange

youtube:
  api-key: ${YOUTUBE_API_KEY}
  base-url: https://www.googleapis.com/youtube/v3
google:
  api-key: ${GOOGLE_CLIENT_ID}
  base-url: https://www.googleapis.com

github:
  client-id: ${GITHUB_CLIENT_ID:}
  client-secret: ${GITHUB_CLIENT_SECRET:}

facebook:
  app-id: ${FACEBOOK_APP_ID:}
  app-secret: ${FACEBOOK_APP_SECRET:}

rabbitmq:
  exchange:
    name:
      notification: notification-exchange
      point: point-exchange
      activity:
        search:
          exchangeName: activity.search.exchange

  routingKey:
    notification: notification.family.notifier
    email: userpoint.notification.email
    point: point.log.activity

    activity:
      delete:
        enriched: activity.delete.enriched
      search:
        create: activity.search.create
        enriched: activity.search.enriched
message:
  error:
    generic: "?lang?error_generic?lang?"
  exceptions:
    forbidden:
      resource-missing: "?lang?forbidden_resource_missing?lang?"
      access-denied-resource: "?lang?forbidden_access_denied_resource?lang?"
      identity-missing: "?lang?forbidden_identity_missing?lang?"
      operation-not-self: "?lang?forbidden_operation_not_self?lang?"
      family-operation-denied: "?lang?forbidden_family_operation_denied?lang?"
      authentication-required: "?lang?autenticazione_richiesta?lang?"
      notification-no-receiver: "?lang?forbidden_notification_no_receiver?lang?"
      email-invalid-payload: "?lang?forbidden_email_invalid_payload?lang?"
      cannot-add-child-is-parent: "?lang?forbidden_cannot_add_child_is_parent?lang?"
    not-found:
      user-by-email: "?lang?not_found_user_by_email?lang?"
      activity-by-id: "?lang?not_found_activity_by_id?lang?"
      parent-update: "?lang?not_found_parent_update?lang?"
      persist-log-family: "?lang?not_found_persist_log_family?lang?"
      payload-email-user-current: "?lang?not_found_payload_email_user_current?lang?"
    arithmetic:
      negative-points: "?lang?arithmetic_negative_points?lang?"
    decrypt:
      operation-failed: "?lang?decrypt_operation_failed?lang?"
    image:
      upload-slot-required: "?lang?image_upload_slot_required?lang?"
      upload-slot-invalid: "?lang?image_upload_slot_invalid?lang?"
      upload-email-missing: "?lang?image_upload_email_missing?lang?"
    http:
      generic: "?lang?errore_http?lang?"
    unauthorized:
      invalid-credentials: "?lang?invalid_credentials?lang?"

  document:
    points: "?lang?point_disposizione?lang?"
    add: "?lang?aggiunti_punti?lang?"
    remove: "?lang?sottratti_punti?lang?"

notification:
  service: "familyService"

cloudinary:
  cloud_name: ${CLOUDINARY_NAME}
  api_key: ${CLOUDINARY_API_KEY}
  api_secret: ${CLOUDINARY_API_SECRET}

email:
  username: ${EMAIL_USER}
  password: ${EMAIL_PASSWORD}
