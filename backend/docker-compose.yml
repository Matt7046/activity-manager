version: '3.8'

services:
  frontend:   
    image: docker.io/matt7046/frontend:1.0.1
    container_name: frontend
    # In produzione Next.js gira sulla 3000
    expose:
      - "3000"
    env_file:
      - .env
    networks:
      - app-network
    restart: always

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - 'RABBITMQ_DEFAULT_PASS=password'
      - 'RABBITMQ_DEFAULT_USER=username'
    networks:
      - app-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.9.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - ELASTIC_PASSWORD=password
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=true
      - xpack.security.http.ssl.keystore.path=certs/elastic-certificates.p12
      - xpack.security.http.ssl.keystore.password=password
      - xpack.security.transport.ssl.enabled=false
    healthcheck:
      test: [ "CMD-SHELL", "curl -k -u elastic:password https://localhost:9200 >/dev/null 2>&1 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    volumes:
      - ./elasticsearch/certs:/usr/share/elasticsearch/config/certs:ro
      - esdata:/usr/share/elasticsearch/data
    networks:      
      - app-network
      
  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # FIX CERTIFICATI: Montiamo tutta la cartella e quella delle lib per i link simbolici
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/lib/letsencrypt:/var/lib/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - image-service
      - user-point-service
      - activity-service
      - auth-service
      - family-service
      - notification-service
    networks:
      - app-network

  # --- MICROSERVIZI ---
  user-point-service:
    depends_on:
      elasticsearch:
        condition: service_healthy
    image: docker.io/matt7046/user-point-service:1.0.0
    volumes:
      - ./service/userPoint/src/main/resources/certificate:/app/certificate
    env_file:
      - .env
    networks:
      - app-network

  activity-service:  
    depends_on:
      elasticsearch:
        condition: service_healthy
    image: docker.io/matt7046/activity-service:1.0.0
    volumes:
      - ./service/activity/src/main/resources/certificate:/app/certificate
    env_file:
      - .env
    networks:
      - app-network

  auth-service:
    depends_on:
      elasticsearch:
        condition: service_healthy
    image: docker.io/matt7046/auth-service:1.0.0
    volumes:
      - ./service/auth/src/main/resources/certificate:/app/certificate 
    env_file:
      - .env     
    networks:
      - app-network

  family-service:
    depends_on:
      elasticsearch:
        condition: service_healthy
    image: docker.io/matt7046/family-service:1.0.0
    volumes:
      - ./service/family/src/main/resources/certificate:/app/certificate
    env_file:
      - .env
    networks:
      - app-network

  notification-service:
    depends_on:
      elasticsearch:
        condition: service_healthy
    image: docker.io/matt7046/notification-service:1.0.0
    volumes:
      - ./service/notification/src/main/resources/certificate:/app/certificate
    env_file:
      - .env
    networks:
      - app-network

  image-service:
    depends_on:
      elasticsearch:
        condition: service_healthy
    image: docker.io/matt7046/image-service:1.0.0
    volumes:
      - ./service/image/src/main/resources/certificate:/app/certificate
    env_file:
      - .env
    networks:
      - app-network

volumes:
  esdata:     

networks:
  app-network:
    driver: bridge
    # Se la rete non esiste già sul server, togli 'external: true' 
    # o creala con 'docker network create app-network'