version: '3.8'

services:
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    image: docker.io/matt7046/frontend:1.0.1
    container_name: frontend
    env_file:
      - .env
    networks:
      - app-network    

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
      - 'RABBITMQ_DEFAULT_PASS=password'
      - 'RABBITMQ_DEFAULT_USER=username'
    ports:
      - "5672:5672"
      - "15672:15672"   
    env_file:
      - .env
    networks:
      - app-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.9.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - ELASTIC_PASSWORD=password
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=true
      - xpack.security.http.ssl.keystore.path=certs/elastic-certificates.p12
      - xpack.security.http.ssl.keystore.password=password
      - xpack.security.transport.ssl.enabled=false
    healthcheck:
      test: [ "CMD-SHELL", "curl -k -u elastic:password https://localhost:9200 >/dev/null 2>&1 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - ./elasticsearch/certs:/usr/share/elasticsearch/config/certs:ro
      - esdata:/usr/share/elasticsearch/data
    env_file:
      - .env
    networks:      
      - app-network
      
  nginx:
    image: nginx:latest
    container_name: nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - /root/app/frontend-build:/usr/share/nginx/html:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
      - image-service
      - user-point-service
      - activity-service
      - auth-service
      - family-service
      - notification-service
    networks:
      - app-network

  user-point-service:
    depends_on:
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    image: docker.io/matt7046/user-point-service:1.0.0
    build:
      context: ./ 
      dockerfile: service/userPoint/Dockerfile
    volumes:
      - ./service/userPoint/src/main/resources/certificate:/app/certificate
    env_file:
      - .env
    networks:
      - app-network

  activity-service:
    depends_on:
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    image: docker.io/matt7046/activity-service:1.0.0
    build:
      context: ./
      dockerfile: service/activity/Dockerfile

    volumes:
      # Mappiamo la cartella dove hai salvato il file .p12
      # Assicurati che il file si chiami elastic-truststore.p12 dentro quella cartella
      - ./service/activity/src/main/resources/certificate:/app/certificate
    env_file:
      - .env
    networks:
      - app-network

  # RIMOSSO: "sleep infinity" (altrimenti l'app Java non parte mai)
  # Il container userà l'ENTRYPOINT definito nel tuo Dockerfile

  auth-service:
    depends_on:
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    image: docker.io/matt7046/auth-service:1.0.0
    build:
      context: ./
      dockerfile: service/auth/Dockerfile    
    volumes:
      - ./service/auth/src/main/resources/certificate:/app/certificate
    env_file:
      - .env    
    networks:
      - app-network

  family-service:
    depends_on:
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    image: docker.io/matt7046/family-service:1.0.0
    build:
      context: ./
      dockerfile: service/family/Dockerfile
    volumes:
      - ./service/family/src/main/resources/certificate:/app/certificate
    env_file:
      - .env
    networks:
      - app-network

  notification-service:
    depends_on:
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    image: docker.io/matt7046/notification-service:1.0.0
    build:
      context: ./
      dockerfile: service/notification/Dockerfile
    volumes:
      - ./service/notification/src/main/resources/certificate:/app/certificate
    env_file:
      - .env
    networks:
      - app-network

  image-service:
    depends_on:
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    image: docker.io/matt7046/image-service:1.0.0
    build:
      context: ./
      dockerfile: service/image/Dockerfile
    volumes:
      - ./service/image/src/main/resources/certificate:/app/certificate
    env_file:
      - .env
    networks:
      - app-network
volumes:
  esdata:     

networks:
  app-network:
    driver: bridge
    external: true


