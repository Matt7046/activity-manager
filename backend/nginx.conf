events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Configurazione comune Proxy per Next.js e Microservizi
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # IMPORTANTE: Passaggio del Bearer Token
    proxy_pass_header Authorization;

    # --- BLOCCO HTTP (Redirect a HTTPS) ---
    server {
        listen 80;
        server_name activity-manager.colorsdev.tech 173.212.220.20;
        return 301 https://$host$request_uri;
    }

    # --- BLOCCO HTTPS (Next.js + API) ---
    server {
        listen 443 ssl;
        server_name activity-manager.colorsdev.tech 173.212.220.20;

        ssl_certificate /etc/letsencrypt/live/activity-manager.colorsdev.tech/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/activity-manager.colorsdev.tech/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        # Frontend Next.js
        # Puntiamo alla porta 3000 dove gira il server Node di Next.js
        location / {
            proxy_pass http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;
        }

        # WebSocket (Notifiche)
        location /ws/notifications {
            proxy_pass http://notification-service:8080/ws/notifications;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # --- GESTIONE API ---
        # In Next.js le chiamate API lato client useranno /api/
        location /api/ {
            # Gestione Preflight CORS (se necessaria per chiamate cross-domain)
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
                add_header 'Access-Control-Max-Age' 1728000;
                return 204;
            }

            # Routing ai Microservizi
            if ($uri ~* ^/api/userpoint/)     { proxy_pass http://user-point-service:8080; }
            if ($uri ~* ^/api/gamification/)  { proxy_pass http://user-point-service:8080; }
            if ($uri ~* ^/api/activity/)      { proxy_pass http://activity-service:8080; }
            if ($uri ~* ^/api/logactivity/)   { proxy_pass http://activity-service:8080; }
            if ($uri ~* ^/api/auth/)          { proxy_pass http://auth-service:8080; }
            if ($uri ~* ^/api/family/)        { proxy_pass http://family-service:8080; }
            if ($uri ~* ^/api/notification/)  { proxy_pass http://notification-service:8080; }
            if ($uri ~* ^/api/image/)         { proxy_pass http://image-service:8080; }
        }
    }
}