events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Configurazione comune Proxy
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    server {
        listen 80;
        server_name activity-manager.colorsdev.tech 173.212.220.20;

        root /usr/share/nginx/html;
        index index.html;

        # --- LOGICA CORS RIUTILIZZABILE ---
        # Questa logica permette le chiamate da qualsiasi origine. 
        # Se vuoi essere più restrittivo, sostituisci '*' con 'http://activity-manager.colorsdev.tech'
        set $cors_origin "*";
        set $cors_methods "GET, POST, OPTIONS, PUT, DELETE, PATCH";
        set $cors_headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization";

        # Frontend React
        location / {
            proxy_pass http://frontend:80;
        }

        # WebSocket
        location /ws/notifications {
            proxy_pass http://notification-service:8080/ws/notifications;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # --- GESTIONE API CON CORS ---
        # Usiamo un'espressione regolare per applicare il CORS a tutte le rotte /api/
        location ~ ^/api/(.*)$ {
            
            # 1. Gestione Preflight (Richieste OPTIONS)
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' $cors_methods always;
                add_header 'Access-Control-Allow-Headers' $cors_headers always;
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            # 2. Header CORS per le richieste normali
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' $cors_methods always;
            add_header 'Access-Control-Allow-Headers' $cors_headers always;

            # 3. Smistamento ai Microservizi
            if ($uri ~* ^/api/userpoint/)     { proxy_pass http://user-point-service:8080; }
            if ($uri ~* ^/api/gamification/)  { proxy_pass http://user-point-service:8080; }
            if ($uri ~* ^/api/activity/)      { proxy_pass http://activity-service:8080; }
            if ($uri ~* ^/api/logactivity/)   { proxy_pass http://activity-service:8080; }
            if ($uri ~* ^/api/auth/)          { proxy_pass http://auth-service:8080; }
            if ($uri ~* ^/api/family/)        { proxy_pass http://family-service:8080; }
            if ($uri ~* ^/api/notification/)  { proxy_pass http://notification-service:8080; }
            if ($uri ~* ^/api/image/)         { proxy_pass http://image-service:8080; }
        }
    }
    server {
    listen 443 ssl;
    server_name activity-manager.colorsdev.tech 173.212.220.20;

    ssl_certificate /etc/letsencrypt/live/activity-manager.colorsdev.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/activity-manager.colorsdev.tech/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Frontend React
    location / {
        proxy_pass http://frontend:80;
    }

    # WebSocket
    location /ws/notifications {
        proxy_pass http://notification-service:8080/ws/notifications;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

   # Gestione API con routing corretto (Senza aggiungere header CORS manuali)
        location /api/ {
            if ($uri ~* ^/api/userpoint/)     { proxy_pass http://user-point-service:8080; }
            if ($uri ~* ^/api/gamification/)  { proxy_pass http://user-point-service:8080; }
            if ($uri ~* ^/api/activity/)      { proxy_pass http://activity-service:8080; }
            if ($uri ~* ^/api/logactivity/)   { proxy_pass http://activity-service:8080; }
            if ($uri ~* ^/api/auth/)          { proxy_pass http://auth-service:8080; }
            if ($uri ~* ^/api/family/)        { proxy_pass http://family-service:8080; }
            if ($uri ~* ^/api/notification/)  { proxy_pass http://notification-service:8080; }
            if ($uri ~* ^/api/image/)         { proxy_pass http://image-service:8080; }
        }
    }

}
