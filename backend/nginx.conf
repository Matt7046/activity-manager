events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Configurazione comune per passare i dati dell'utente ai microservizi
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # IMPORTANTE: Permette il passaggio del Bearer Token
    proxy_pass_header Authorization;

    server {
        listen 80;
        server_name 173.212.220.20;

        # 1. Gestione del Frontend Next.js
        location / {
            # "frontend" è il nome del servizio nel tuo docker-compose
            # Se il servizio si chiama diversamente, usa quel nome
            proxy_pass http://frontend:3000; 
            proxy_set_header Authorization $http_authorization; # Passa il token!
            proxy_pass_header Authorization;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;
        }

        # 2. WebSocket Notifications
        location /ws/notifications {
            proxy_pass http://notification-service:8080/ws/notifications;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            # AGGIUNGI QUESTE RIGHE:
            proxy_set_header Authorization $http_authorization; 
            proxy_pass_header Authorization;
        }

        # 3. Proxy per i Microservizi (API)
        # Assicurati che i nomi dei servizi (es. user-point-service) 
        # corrispondano a quelli nel tuo docker-compose.yml

        location /api/userpoint/ {
            proxy_pass http://user-point-service:8080/api/userpoint/;
            # AGGIUNGI QUESTE RIGHE:
            proxy_set_header Authorization $http_authorization; 
            proxy_pass_header Authorization;
        }

        location /api/gamification/ {
            proxy_pass http://user-point-service:8080/api/gamification/;
            # AGGIUNGI QUESTE RIGHE:
            proxy_set_header Authorization $http_authorization; 
            proxy_pass_header Authorization;
        }

        location /api/activity/ {
            proxy_pass http://activity-service:8080/api/activity/;
            # AGGIUNGI QUESTE RIGHE:
            proxy_set_header Authorization $http_authorization; 
            proxy_pass_header Authorization;
        }

        location /api/logactivity/ {
            proxy_pass http://activity-service:8080/api/logactivity/;
            # AGGIUNGI QUESTE RIGHE:
            proxy_set_header Authorization $http_authorization; 
            proxy_pass_header Authorization;
        }

        location /api/auth/ {
            proxy_pass http://auth-service:8080/api/auth/;
            # AGGIUNGI QUESTE RIGHE:
            proxy_set_header Authorization $http_authorization; 
            proxy_pass_header Authorization;
        }

        location /api/family/ {
            proxy_pass http://family-service:8080/api/family/;
            # AGGIUNGI QUESTE RIGHE:
            proxy_set_header Authorization $http_authorization; 
            proxy_pass_header Authorization;
        }

        location /api/notification/ {
            proxy_pass http://notification-service:8080/api/notification/;
            # AGGIUNGI QUESTE RIGHE:
            proxy_set_header Authorization $http_authorization; 
            proxy_pass_header Authorization;
        }

        location /api/image/ {
             proxy_pass http://image-service:8080/api/image/;
             # AGGIUNGI QUESTE RIGHE:
            proxy_set_header Authorization $http_authorization; 
            proxy_pass_header Authorization;
        }
    }
}