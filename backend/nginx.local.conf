events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Header comuni verso i microservizi
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass_header Authorization;

    # Routing locale (1 istanza per servizio in docker-compose.local.yml)
    upstream frontend_backend {
        server frontend:3000;
    }

    upstream user_point_backend {
        least_conn;
        server user-point-service:8080;
    }

    upstream activity_service_backend {
        least_conn;
        server activity-service:8080;
    }

    upstream auth_backend {
        server auth-service:8080;
    }

    upstream notification_backend {
        least_conn;
        server notification-service:8080;
    }

    upstream image_backend {
        server image-service:8080;
    }

    server {
        listen 80;
        server_name localhost 127.0.0.1 _;

        location / {
            proxy_pass http://frontend_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;
        }

        location /ws/notifications {
            proxy_pass http://notification_backend/ws/notifications;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /api/ {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
                add_header 'Access-Control-Max-Age' 1728000;
                return 204;
            }

            if ($uri ~* ^/api/userpoint/)     { proxy_pass http://user_point_backend; }
            if ($uri ~* ^/api/gamification/)  { proxy_pass http://user_point_backend; }
            if ($uri ~* ^/api/activity/)      { proxy_pass http://activity_service_backend; }
            if ($uri ~* ^/api/logactivity/)   { proxy_pass http://activity_service_backend; }
            if ($uri ~* ^/api/auth/)          { proxy_pass http://auth_backend; }
            if ($uri ~* ^/api/family-point/)   { proxy_pass http://user_point_backend; }
            if ($uri ~* ^/api/family-log/)    { proxy_pass http://user_point_backend; }
            if ($uri ~* ^/api/notification/)  { proxy_pass http://notification_backend; }
            if ($uri ~* ^/api/image/)         { proxy_pass http://image_backend; }
        }
    }
}
